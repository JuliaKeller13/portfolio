<div class="nav-container">
  <nav>
    <a class="logo-nav" (click)="scrollToSection('home')">
      @if (isMobile()) {
        <img src="icons/logo-mobile.svg" alt="Logo">
      } @else {
        <img src="icons/logo-dark.svg" alt="Logo">
      }
    </a>

    <app-burger-button [isActive]="menuOpen()" (toggled)="toggleMenu()"></app-burger-button>

    <ul [class.show]="menuOpen()">
      <li><a [class.active]="activeSection() === 'about'" (click)="scrollToSection('about')">Why me</a></li>
      <li><a [class.active]="activeSection() === 'skills'" (click)="scrollToSection('skills')">Skills</a></li>
      <li><a [class.active]="activeSection() === 'projects'" (click)="scrollToSection('projects')">Projects</a></li>
      <li><a [class.active]="activeSection() === 'contact'" (click)="scrollToSection('contact')">Contact</a></li>
    </ul>

    <div class="lang-switcher">
      <button [class.active]="activeLang() === 'de'" (click)="setLang('de')">DE</button>
      <button [class.active]="activeLang() === 'en'" (click)="setLang('en')">EN</button>
    </div>
  </nav>
</div>

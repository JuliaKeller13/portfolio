<app-section sectionId="skills">
  <div class="inner-container">
    <app-heading>{{ 'SKILLS.HEADING' | translate }}</app-heading>
    <div class="skills-content">
      <div class="skills-container">
        @for (skill of skills; track skill.NAME) {
          <div class="icon-s">
            <img class="rend-icons" [src]="skill.ICON" [alt]="skill.NAME + ' icon'" />
            <p>{{ skill.NAME }}</p>
          </div>
        }
      </div>
      
      <div class="text">
        <p>{{ 'SKILLS.CURRENTLY_LEARNING' | translate }}</p>
        <div class="mobile-focus-container">
          <p class="mobile-focus-text">
            {{ 'SKILLS.FOCUS_TEXT' | translate }}
          </p>
          <div class="icons-box">
            <div class="icon-s">
              <img src="/icons/skill-icons/angular.svg" alt="Angular icon" />
              <p>{{ 'SKILLS.ANGULAR' | translate }}</p>
            </div>
            <div class="icon-s">
              <img src="/icons/skill-icons/typescript.svg" alt="TypeScript icon" />
              <p>{{ 'SKILLS.TYPESCRIPT' | translate }}</p>
            </div>
          </div>
        </div>
      </div>
      <app-button btnClass="primary-btn" (click)="scrollToSection('contact')"></app-button>
    </div>
  </div>
</app-section>

<app-section sectionId="about">
    <app-heading>{{ 'ABOUT.HEADING' | translate }}</app-heading>
    <div class="about-content">
        <div class="printed-text">
            <div class="icon-box" [class.visible]="showIcon">
                <img [src]="phrases[currentIndex].icon" alt="icon">
            </div>
            <p class="anim-text">
                <span>{{ phrases[currentIndex].prefix }}</span> {{ displayText  }} <span>...</span><span class="cursor">|</span>
            </p>
        </div>
        <p class="about-text">{{ 'ABOUT.CONTENT' | translate }}</p>
    </div>
</app-section>

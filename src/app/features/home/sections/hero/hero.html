<app-section sectionId="home" class="hero-section">
  <div class="inner-container">
    <div class="photo-container">
      <div class="shape"></div>
      <img src="imgs/JuliaKeller.webp" [attr.alt]="'HERO.PHOTO_ALT' | translate" />
    </div>
    <div class="hero-content">
      <div class="logo-icon">
        <div class="logo-container">
          <img class="logo-base" src="icons/logo-hero-wo.svg" [attr.alt]="'HERO.LOGO_ALT' | translate" />
          <img class="logo-overlay" src="icons/logo-hero-o.svg" [attr.alt]="'HERO.LOGO_ALT' | translate" />
        </div>
        <app-social-icons id="social-icons"></app-social-icons>
      </div>

      <h1>{{ 'HERO.NAME' | translate }}</h1>
      <p>{{ 'HERO.ROLE' | translate }}</p>
      <div class="arrow-button">
        <app-button variant="arrow-btn" (click)="scrollToAbout()"></app-button>
      </div>
    </div>
  </div>
</app-section>
